<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Isha!</title>
    <style>
        :root { --pink: #ffb7b2; --cream: #fff9f0; --gray: #6d6875; }
        body { margin: 0; padding: 0; background: var(--cream); font-family: sans-serif; color: var(--gray); text-align: center; overflow-x: hidden; }
        
        /* Section 1 */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #giant-cake { 
            font-size: 120px; cursor: pointer; user-select: none; 
            -webkit-tap-highlight-color: transparent; margin: 20px; 
            transition: transform 0.1s ease;
        }
        #giant-cake:active { transform: scale(1.4); }
        #wish-text { height: 20px; color: var(--pink); font-weight: bold; margin-top: 10px; }
        
        /* Section 2 */
        .game-area { padding: 30px 0; background: white; border-top: 2px solid #eee; }
        canvas { background: #fff; display: block; margin: 0 auto; border-radius: 15px; border: 1px solid #ddd; touch-action: none; }
        #status { height: 40px; font-weight: bold; color: #ff8b94; margin: 10px; font-style: italic; }

        /* Section 3 */
        #secret { display: none; padding: 30px 20px; }
        .box { background: #fff; padding: 25px; border-radius: 20px; max-width: 350px; margin: 0 auto; border: 1px solid var(--pink); text-align: left; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .btn { background: var(--pink); color: white; border: none; padding: 15px 30px; border-radius: 30px; margin-top: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="hero">
        <h1 style="color: #ff8b94;">Happy Birthday, Isha! 🌸</h1>
        <div id="giant-cake" onclick="makeWish()">🎂</div>
        <div id="wish-text">Tap the cake to make a wish</div>
        <p style="font-size: 0.8rem; opacity: 0.5; margin-top: 40px;">↡ Scroll down to play ↡</p>
    </div>

    <div class="game-area">
        <div id="stats" style="font-weight:bold; color:var(--pink); margin-bottom:5px;">Treats: 0</div>
        <div id="status">Catch 5 treats to unlock!</div>
        <canvas id="canvas"></canvas>
    </div>

    <div id="secret">
        <div class="box"><p id="note"></p></div>
        <button class="btn" id="v-btn" style="display:none;" onclick="document.getElementById('v-wrap').style.display='block';">Open Final Gift 🎁</button>
        <div id="v-wrap" style="display:none; margin-top:20px;">
            <video id="vid" controls playsinline style="width:100%; border-radius:15px;">
                <source src="your-video.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <script>
        const msg = "Hello Isha...\n\nYou're the most beautiful person I know. Happy Birthday!";

        function makeWish() {
            const wishText = document.getElementById('wish-text');
            wishText.innerText = "Wish Sent! ✨";
            setTimeout(() => { wishText.innerText = "Tap for another wish"; }, 2000);
        }

        // Game Setup
        const cvs = document.getElementById('canvas');
        const ctx = cvs.getContext('2d');
        cvs.width = Math.min(window.innerWidth - 40, 350);
        cvs.height = 250;

        let p = { x: 40, y: 180, dy: 0, g: true };
        let items = [];
        let score = 0;
        let unlocked = false;

        function draw() {
            ctx.clearRect(0,0,cvs.width,cvs.height);
            
            // Player Physics
            p.dy += 0.6; p.y += p.dy;
            if (p.y > 180) { p.y = 180; p.g = true; }
            ctx.font = "40px Arial"; ctx.fillText("✨", p.x, p.y);

            // Item Logic
            for (let i = items.length - 1; i >= 0; i--) {
                let it = items[i];
                it.x -= 3;
                ctx.font = "30px Arial"; ctx.fillText(it.t, it.x, it.y);

                // Collision
                if (Math.abs(p.x - it.x) < 30 && Math.abs(p.y - it.y) < 30) {
                    if (it.t !== '☁️') {
                        score++;
                        items.splice(i, 1);
                        document.getElementById('stats').innerText = "Treats: " + score;
                        updateCommentary(score);
                    } else {
                        it.t = '🌸';
                    }
                }
            }
            items = items.filter(it => it.x > -50);
            requestAnimationFrame(draw);
        }

        function updateCommentary(s) {
            const st = document.getElementById('status');
            if (s == 1) st.innerText = "First one! Nice.";
            if (s == 3) st.innerText = "Almost there...";
            if (s == 5) unlock();
            if (s == 10) st.innerText = "Oh, so nobody cares about the message...";
            if (s == 15) st.innerText = "Pro gamer vibes!";
            if (s == 25) st.innerText = "Slow down lady! ✋";
        }

        function spawn() {
            const types = ['🍓', '🥟', '☁️'];
            const t = types[Math.floor(Math.random() * 3)];
            items.push({ x: cvs.width, y: Math.random() > 0.5 ? 180 : 100, t: t });
        }
        
        function jump() { if(p.g) { p.dy = -12; p.g = false; } }
        cvs.addEventListener('touchstart', (e) => { jump(); e.preventDefault(); }, {passive:false});
        cvs.addEventListener('mousedown', jump);

        function unlock() {
            if (unlocked) return;
            unlocked = true;
            document.getElementById('status').innerText = "UNLOCKED! Scroll down.";
            document.getElementById('secret').style.display = 'block';
            typeWriter(msg, 0);
        }

        function typeWriter(t, i) {
            if (i < t.length) {
                document.getElementById("note").innerHTML = t.substring(0, i + 1).replace(/\n/g, '<br>');
                setTimeout(() => typeWriter(t, i + 1), 50);
            } else {
                document.getElementById('v-btn').style.display = 'block';
            }
        }

        setInterval(spawn, 2000);
        draw();
    </script>
</body>
</html>
