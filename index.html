<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Isha! 🌷</title>
    <style>
        :root { --pink: #ffb7b2; --cream: #fff9f0; --gray: #6d6875; }
        body { margin: 0; padding: 0; background: var(--cream); font-family: sans-serif; color: var(--gray); text-align: center; }
        
        /* Part 1: The Ritual */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #giant-cake { font-size: 100px; cursor: pointer; margin: 20px; transition: transform 0.1s; -webkit-tap-highlight-color: transparent; }
        #giant-cake:active { transform: scale(1.2); }
        
        /* Part 2: The Game */
        .game-area { padding: 40px 0; background: white; border-top: 1px solid #eee; min-height: 450px; }
        canvas { background: #fff; display: block; margin: 0 auto; border-radius: 10px; border: 1px solid #ddd; touch-action: none; }
        #status { height: 30px; font-weight: bold; color: #ff8b94; margin: 15px; font-style: italic; }
        
        /* Part 3: The Reveal */
        #secret { display: none; padding: 30px 20px; animation: fadeIn 1s; }
        .box { background: #fff; padding: 20px; border-radius: 15px; max-width: 340px; margin: 0 auto; border: 1px solid var(--pink); text-align: left; line-height: 1.6; }
        .btn { background: var(--pink); color: white; border: none; padding: 15px 30px; border-radius: 30px; margin-top: 20px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        
        #v-wrap { display: none; margin-top: 25px; }
        .hd-link { display: block; margin-top: 15px; color: var(--pink); text-decoration: none; font-size: 0.85rem; font-weight: bold; opacity: 0.8; }

        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
    </style>
</head>
<body>

    <div class="hero">
        <h1 style="color: #ff8b94;">Happy Birthday, Isha! 🌸</h1>
        <div id="giant-cake" onclick="this.innerText='✨'; setTimeout(()=>this.innerText='🎂', 1000);">🎂</div>
        <p>Tap the cake to make a wish</p>
        <p style="font-size: 0.8rem; opacity: 0.4; margin-top: 50px;">↡ Scroll down to play ↡</p>
    </div>

    <div class="game-area">
        <div id="stats" style="font-weight:bold; color:var(--pink);">Treats Collected: 0</div>
        <div id="status">Let's play a game, catch 5 treats to unlock a surprise 😉</div>
        <canvas id="canvas"></canvas>
    </div>

    <div id="secret">
        <div class="box"><p id="note"></p></div>
        <button class="btn" id="v-btn" style="display:none;" onclick="revealSurprise()">Open Your Final Gift 🎁</button>
        
        <div id="v-wrap">
            <video id="vid" controls playsinline style="width:100%; border-radius:12px; border: 2px solid var(--pink);">
                <source src="https://raw.githubusercontent.com/domainhacker0419/Happy-bdday/main/bday-video.mp4" type="video/mp4">
            </video>
            <p style="font-size: 0.75rem; margin-top: 10px; opacity: 0.6;">Is the video a bit blurry?</p>
            <a href="https://drive.google.com/your-hd-video-link-here" target="_blank" class="hd-link">
                ✨ Watch in Full HD (77MB) ✨
            </a>
        </div>
    </div>

    <script>
        // --- YOUR CUSTOM MESSAGE ---
        const msg = "Hello Isha...\n\nYou're the most beautiful person I know. I hope this little game made you smile. Happy Birthday!";

        const cvs = document.getElementById('canvas');
        const ctx = cvs.getContext('2d');
        cvs.width = Math.min(window.innerWidth - 40, 340);
        cvs.height = 240;

        let p = { x: 40, y: 170, dy: 0, g: true };
        let items = [];
        let score = 0;
        let gameStarted = false;
        let gameSpeed = 3; 
        let spawnRate = 2000;
        let unlocked = false;

        // Start game on scroll
        window.onscroll = function() {
            if (!gameStarted && window.pageYOffset > 150) {
                gameStarted = true;
                draw();
                triggerSpawn();
            }
        };

        function draw() {
            ctx.clearRect(0,0,cvs.width,cvs.height);
            p.dy += 0.7; p.y += p.dy;
            if (p.y > 170) { p.y = 170; p.g = true; }
            ctx.font = "35px Arial"; ctx.fillText("✨", p.x, p.y);

            for (let i = items.length - 1; i >= 0; i--) {
                let it = items[i];
                it.x -= gameSpeed;
                ctx.fillText(it.t, it.x, it.y);

                if (Math.abs(p.x - it.x) < 30 && Math.abs(p.y - it.y) < 30) {
                    if (it.t === '🍓' || it.t === '🥟') {
                        score++;
                        items.splice(i, 1);
                        document.getElementById('stats').innerText = "Treats Collected: " + score;
                        updateCommentary(score);
                        if(score == 5) unlock();
                        
                        // Scale Difficulty
                        gameSpeed += 0.15;
                        spawnRate = Math.max(700, spawnRate - 80);
                    } else if (it.t === '☁️') {
                        it.t = '🌷'; 
                    }
                }
            }
            items = items.filter(it => it.x > -50);
            requestAnimationFrame(draw);
        }

        function updateCommentary(s) {
            const st = document.getElementById('status');
            if (s == 1) st.innerText = "First one! Nice.";
            if (s == 3) st.innerText = "Almost there...";
            if (s == 6) st.innerText = "Wait, nobody told you to stop?";
            if (s == 10) st.innerText = "Okay, pro gamer mode activated! 🔥";
            if (s == 20) st.innerText = "Slow down lady! ✋";
        }

        function triggerSpawn() {
            if (!gameStarted) return;
            const obstacleChance = score > 8 ? 0.5 : 0.2; 
            const type = Math.random() < obstacleChance ? '☁️' : (Math.random() > 0.5 ? '🍓' : '🥟');
            items.push({ x: cvs.width, y: type === '☁️' ? 170 : 80 + Math.random()*80, t: type });
            setTimeout(triggerSpawn, spawnRate);
        }
        
        function jump() { if(p.g) { p.dy = -13; p.g = false; } }
        cvs.addEventListener('touchstart', (e) => { jump(); e.preventDefault(); }, {passive:false});
        cvs.addEventListener('mousedown', jump);

        function unlock() {
            if (unlocked) return;
            unlocked = true;
            document.getElementById('status').innerText = "UNLOCKED! Scroll down.";
            document.getElementById('secret').style.display = 'block';
            typeWriter(msg, 0);
        }

        function typeWriter(t, i) {
            if (i < t.length) {
                document.getElementById("note").innerHTML = t.substring(0, i+1).replace(/\n/g, '<br>');
                setTimeout(() => typeWriter(t, i+1), 50);
            } else { document.getElementById('v-btn').style.display = 'block'; }
        }

        function revealSurprise() {
            document.getElementById('v-wrap').style.display = 'block';
            document.getElementById('vid').play();
            // Smooth scroll to video
            setTimeout(() => {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 100);
        }
    </script>
</body>
</html>
