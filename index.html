<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday!</title>
    <style>
        :root { --soft-pink: #ff9a9e; --bg-cream: #fdfaf6; --text-grey: #5a5a5a; }
        body { margin: 0; padding: 0; background: var(--bg-cream); font-family: 'Segoe UI', sans-serif; color: var(--text-grey); text-align: center; overflow-x: hidden; }

        /* Sections */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .game-section { padding: 40px 0; background: white; border-top: 1px solid #eee; }
        .surprise-section { padding: 60px 20px; min-height: 50vh; display: none; } /* Hidden until score 5 */

        h1 { font-size: 2.8rem; color: var(--soft-pink); margin: 0; }
        #gameCanvas { background: #fff; display: block; margin: 0 auto; touch-action: none; border-radius: 10px; }
        
        /* The Secret Message Box */
        #secret-message-box {
            display: none;
            background: #fff0f3;
            border: 2px dashed var(--soft-pink);
            padding: 20px;
            margin: 20px auto;
            width: 80%;
            max-width: 400px;
            border-radius: 15px;
            animation: fadeIn 1s;
        }

        #score-board { font-size: 1.2rem; font-weight: bold; color: var(--soft-pink); margin-bottom: 10px; }
        #status-msg { height: 30px; font-weight: bold; color: #f093fb; margin: 10px 0; }

        video { width: 100%; max-width: 320px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-top: 20px; }
        .btn { background: var(--soft-pink); color: white; border: none; padding: 15px 35px; border-radius: 50px; font-size: 1.1rem; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Happy Birthday! 🎂</h1>
        <p>I have a secret for you...</p>
        <p>But you have to prove you're a Cake Master first!</p>
        <p style="font-size: 0.8rem; opacity: 0.5;">(Scroll down to play)</p>
    </div>

    <div class="game-section">
        <div id="score-board">Cakes Caught: 0 / 5</div>
        <div id="status-msg">Catch 5 cakes to unlock the secret!</div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="surprise-section" id="unlock-area">
        <div id="secret-message-box">
            <h3 style="color: var(--soft-pink); margin-top: 0;">A Special Note for You ✨</h3>
            <p id="personal-note">Hello</p> </div>

        <button class="btn" onclick="revealVideo()">Click for your final surprise 🎁</button>
        <div id="video-wrapper" style="display:none;">
            <video id="bdayVideo" playsinline controls>
                <source src="your-video.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreBoard = document.getElementById('score-board');
        const unlockArea = document.getElementById('unlock-area');
        const secretBox = document.getElementById('secret-message-box');

        canvas.width = Math.min(window.innerWidth - 40, 400);
        canvas.height = 300;

        let player = { x: 50, y: 230, w: 40, h: 40, dy: 0, jumpPower: -10, gravity: 0.5, grounded: false };
        let items = [];
        let score = 0;
        let unlocked = false;

        function handleInput(e) {
            if (player.grounded) { player.dy = player.jumpPower; player.grounded = false; }
            e.preventDefault();
        }
        canvas.addEventListener('touchstart', handleInput);
        canvas.addEventListener('mousedown', handleInput);

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            player.dy += player.gravity;
            player.y += player.dy;
            if (player.y > 230) { player.y = 230; player.grounded = true; }
            ctx.font = "40px Arial";
            ctx.fillText("✨", player.x, player.y);

            items.forEach((item, index) => {
                item.x -= item.speed;
                ctx.font = "30px Arial";
                ctx.fillText(item.type, item.x, item.y);

                let dx = player.x - item.x;
                let dy = player.y - item.y;
                if (Math.sqrt(dx*dx + dy*dy) < 35 && !item.collected) {
                    item.collected = true;
                    if (item.type === '🎂') {
                        score++;
                        scoreBoard.innerText = `Cakes Caught: ${score} / 5`;
                        checkUnlock();
                    } else if (item.type === '🚫') {
                        item.type = '💖';
                        document.getElementById('status-msg').innerText = "No bad vibes, cutie! ✨";
                        setTimeout(() => document.getElementById('status-msg').innerText = "", 2000);
                    }
                }
            });
            items = items.filter(i => i.x > -50);
            requestAnimationFrame(update);
        }

        function checkUnlock() {
            if (score >= 5 && !unlocked) {
                unlocked = true;
                unlockArea.style.display = 'block';
                secretBox.style.display = 'block';
                document.getElementById('status-msg').innerText = "UNLOCKED! Scroll down! 🎉";
                unlockArea.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function spawnItem() {
            const isCake = Math.random() > 0.4;
            items.push({ x: canvas.width, y: isCake ? 140 : 230, type: isCake ? '🎂' : '🚫', collected: false, speed: 4 });
        }

        function revealVideo() {
            document.getElementById('video-wrapper').style.display = 'block';
            document.getElementById('bdayVideo').play();
        }

        setInterval(spawnItem, 1800);
        update();
    </script>
</body>
</html>
