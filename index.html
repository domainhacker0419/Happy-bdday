<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Isha ✨</title>
    <style>
        :root {
            --midnight: #0a0a0c;
            --spring-sky: linear-gradient(180deg, #0f172a 0%, #1e1b4b 100%);
            --gold: #d4af37;
            --soft-white: #f8f9fa;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'serif', 'Segoe UI', serif;
            background-color: var(--midnight);
            color: var(--soft-white);
            overflow-x: hidden;
            transition: background 3s ease;
        }

        /* ACT 1: THE DARK RITUAL */
        #ritual-layer {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
            position: relative; transition: opacity 2s ease;
        }

        .cake-container { font-size: 80px; position: relative; cursor: pointer; }
        .candles {
            position: absolute; top: -40px; width: 100%;
            display: flex; justify-content: center; gap: 10px;
        }
        .candle { font-size: 30px; transition: transform 0.3s; cursor: pointer; }
        .extinguished { filter: grayscale(1) opacity(0.3); transform: translateY(10px); pointer-events: none; }

        /* ACT 2: THE SPRING GARDEN (Hidden at start) */
        .spring-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--spring-sky); opacity: 0; z-index: -1;
            transition: opacity 3s ease;
        }
        .tulip-silhouette {
            position: absolute; bottom: 0; width: 100%; height: 150px;
            background: url('https://www.transparentpng.com/download/tulip/flowers-tulip-png-20.png');
            background-size: contain; opacity: 0.1; filter: brightness(0.5);
        }

        /* ACT 3: THE GAME */
        #game-area { display: none; padding: 20px 0; }
        #gameCanvas { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(212, 175, 55, 0.3);
            display: block; margin: 0 auto; border-radius: 15px; touch-action: none;
        }
        
        #secret-box {
            display: none; background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--gold); padding: 25px;
            margin: 30px auto; width: 85%; max-width: 450px;
            border-radius: 15px; text-align: left; line-height: 1.8;
        }

        .btn {
            background: none; border: 1px solid var(--gold); color: var(--gold);
            padding: 12px 30px; border-radius: 25px; cursor: pointer;
            margin-top: 20px; font-family: serif; font-size: 1.1rem;
        }

        /* Particle effects */
        .petal { position: fixed; pointer-events: none; z-index: 99; animation: fall 10s linear infinite; }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="spring-bg" id="bg">
        <div class="tulip-silhouette"></div>
    </div>

    <section id="ritual-layer">
        <div class="cake-container">
            <div class="candles">
                <span class="candle" onclick="blowCandle(this)">🕯️</span>
                <span class="candle" onclick="blowCandle(this)">🕯️</span>
                <span class="candle" onclick="blowCandle(this)">🕯️</span>
            </div>
            🍰
        </div>
        <p id="instruction" style="margin-top: 40px; color: var(--gold); letter-spacing: 2px;">MAKE A WISH & TAP THE CANDLES</p>
    </section>

    <div id="game-area">
        <div style="margin-bottom: 10px; color: var(--gold);" id="score">Items Collected: 0 / 5</div>
        <canvas id="gameCanvas"></canvas>

        <div id="secret-box">
            <h3 style="color: var(--gold); text-align: center; margin-top: 0;">For Isha ✨</h3>
            <div id="personal-note"></div>
            
            <center>
                <button class="btn" id="video-btn" style="display:none;" onclick="showVideo()">Open Your Final Gift 🎁</button>
            </center>
            
            <div id="video-wrap" style="display:none; margin-top: 20px;">
                <video id="mainVid" controls playsinline style="width: 100%; border-radius: 10px;">
                    <source src="your-video.mp4" type="video/mp4">
                </video>
            </div>
        </div>
    </section>

    <script>
        // --- CONFIGURATION ---
        const message = "Hello Isha...\n\nYou're the most beautiful person I know. I hope this spring brings you everything you've been wishing for.";
        let candlesOut = 0;
        let score = 0;
        let gameRunning = false;

        // --- ACT 1: THE BLOW OUT ---
        function blowCandle(el) {
            if (el.classList.contains('extinguished')) return;
            el.classList.add('extinguished');
            candlesOut++;
            
            if (candlesOut === 3) {
                document.getElementById('instruction').innerText = "WISH GRANTED.";
                setTimeout(bloomEffect, 1000);
            }
        }

        function bloomEffect() {
            document.getElementById('ritual-layer').style.opacity = '0';
            document.getElementById('bg').style.opacity = '1';
            
            setTimeout(() => {
                document.getElementById('ritual-layer').style.display = 'none';
                document.getElementById('game-area').style.display = 'block';
                initGame();
                // Start Petal Rain
                setInterval(createPetal, 2000);
            }, 2000);
        }

        // --- ACT 3: THE MOMO & STRAWBERRY GAME ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = Math.min(window.innerWidth - 40, 400);
        canvas.height = 300;

        let player = { x: 50, y: 230, dy: 0, grounded: false };
        let items = [];

        function initGame() {
            gameRunning = true;
            requestAnimationFrame(gameLoop);
            setInterval(spawnItem, 2000);
        }

        function spawnItem() {
            if (!gameRunning) return;
            const isMomo = Math.random() > 0.5;
            items.push({ x: canvas.width, y: isMomo ? 230 : 150, type: isMomo ? '🥟' : '🍓', collected: false });
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Player (Tulip)
            player.dy += 0.6; // Gravity
            player.y += player.dy;
            if (player.y > 230) { player.y = 230; player.grounded = true; }
            
            ctx.font = "40px Arial";
            ctx.fillText("🌷", player.x, player.y);

            items.forEach((item, index) => {
                item.x -= 3;
                ctx.fillText(item.type, item.x, item.y);

                // Collision + Vanish Bug Fix
                if (Math.abs(player.x - item.x) < 30 && Math.abs(player.y - item.y) < 30 && !item.collected) {
                    item.collected = true;
                    score++;
                    document.getElementById('score').innerText = `Items Collected: ${score} / 5`;
                    if (score === 5) unlockMessage();
                }
            });

            items = items.filter(i => !i.collected && i.x > -50);
            if (gameRunning) requestAnimationFrame(gameLoop);
        }

        // Jump Controls
        window.addEventListener('touchstart', () => { if(player.grounded) { player.dy = -12; player.grounded = false; }});
        window.addEventListener('mousedown', () => { if(player.grounded) { player.dy = -12; player.grounded = false; }});

        // --- FINAL REVEAL ---
        function unlockMessage() {
            gameRunning = false;
            document.getElementById('secret-box').style.display = 'block';
            typeWriter(message, 0);
        }

        function typeWriter(text, i) {
            if (i < text.length) {
                document.getElementById("personal-note").innerHTML = text.substring(0, i + 1).replace(/\n/g, '<br>');
                setTimeout(() => typeWriter(text, i + 1), 60);
            } else {
                document.getElementById('video-btn').style.display = 'block';
            }
        }

        function showVideo() {
            document.getElementById('video-wrap').style.display = 'block';
            document.getElementById('mainVid').play();
        }

        function createPetal() {
            const p = document.createElement('div');
            p.className = 'petal';
            p.innerText = '🌸';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.fontSize = (Math.random() * 20 + 10) + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 10000);
        }
    </script>
</body>
</html>
