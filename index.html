<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday!</title>
    <style>
        :root { --soft-pink: #ffb7b2; --soft-cream: #fff9f0; --text: #6d6875; }
        body { margin: 0; padding: 0; background: var(--soft-cream); font-family: 'Segoe UI', sans-serif; color: var(--text); text-align: center; overflow-x: hidden; }

        /* Act 1: The Giant Interactive Cake */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #giant-cake { 
            font-size: 120px; cursor: pointer; transition: transform 0.2s; 
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        #giant-cake:active { transform: scale(1.3) rotate(5deg); }
        .hint { margin-top: 20px; font-size: 0.9rem; opacity: 0.5; }

        /* Act 2: The Dino-style Game */
        .game-section { padding: 40px 0; background: white; border-top: 2px solid #fdf2f2; }
        #gameCanvas { background: #fff; display: block; margin: 0 auto; border-radius: 15px; touch-action: none; cursor: pointer; }
        #commentary { height: 40px; font-weight: bold; color: #ff8b94; margin: 10px 0; font-style: italic; font-size: 1.1rem; }
        #score-stats { font-size: 1rem; margin-bottom: 10px; color: var(--soft-pink); font-weight: bold; }

        /* Act 3: The Secret Reveal */
        #secret-area { display: none; padding: 40px 20px; animation: fadeIn 1s; }
        .message-box { background: #fff; padding: 25px; border-radius: 20px; max-width: 400px; margin: 0 auto; border: 1.5px solid var(--soft-pink); text-align: left; }
        .btn { background: var(--soft-pink); color: white; border: none; padding: 15px 30px; border-radius: 30px; margin-top: 20px; cursor: pointer; }

        @keyframes fadeIn { from {opacity:0} to {opacity:1} }
    </style>
</head>
<body>

    <div class="hero">
        <div id="giant-cake" onclick="cakePop()">🎂</div>
        <h1 style="color: #ff8b94;">Tap the cake!</h1>
        <p>Then scroll down for the real challenge...</p>
        <div class="hint">↡ Scroll for the Dino-Mode ↡</div>
    </div>

    <div class="game-section">
        <div id="score-stats">Strawberries & Momos: 0 | Vibes Healed: 0</div>
        <div id="commentary">Catch 5 to unlock your message!</div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="secret-area">
        <div class="message-box"><p id="personal-note"></p></div>
        <button class="btn" id="reveal-btn" style="display:none;" onclick="showFinal()">See Your Final Gift 🎁</button>
        <div id="video-wrap" style="display:none; margin-top:20px;">
            <video id="bdayVid" controls playsinline style="width:100%; max-width:320px; border-radius:15px;">
                <source src="your-video.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        const myMessage = "Hello Isha...\n\nYou're the most beautiful person I know.\nI hope this little game made you smile.";
        
        // --- GIANT CAKE LOGIC ---
        function cakePop() {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.3 }, colors: ['#ffb7b2', '#ffdac1', '#e2f0cb'] });
        }

        // --- GAME ENGINE ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = Math.min(window.innerWidth - 40, 380);
        canvas.height = 250;

        let player = { x: 40, y: 180, dy: 0, grounded: false };
        let items = [];
        let score = 0;
        let vibesHealed = 0;
        let unlocked = false;
        let gameSpeed = 3.5;

        function getCommentary(s) {
            if (s == 1) return "First one! Nice.";
            if (s == 3) return "Almost there...";
            if (s == 5) return "UNLOCKED! Scroll down for the note.";
            if (s == 7) return "Wait, you're still playing?";
            if (s == 10) return "Oh, so nobody cares about the message...";
            if (s == 15) return "Okay, we got a pro gamer here!";
            if (s == 20) return "Buddy, I'll get serious now...";
            if (s == 25) return "Slow down lady! ✋";
            if (s == 35) return "We have a champion!";
            if (s >= 50) return "You won! You can stop now! 😂";
            return "";
        }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Player (Dino Style)
            player.dy += 0.6;
            player.y += player.dy;
            if (player.y > 180) { player.y = 180; player.grounded = true; }
            ctx.font = "40px Arial";
            ctx.fillText("✨", player.x, player.y);

            items.forEach((item, index) => {
                item.x -= gameSpeed;
                ctx.font = "30px Arial";
                ctx.fillText(item.type, item.x, item.y);

                if (Math.abs(player.x - item.x) < 30 && Math.abs(player.y - item.y) < 30) {
                    if (item.type === '🍓' || item.type === '🥟') {
                        score++;
                        items.splice(index, 1);
                        const msg = getCommentary(score);
                        if(msg) document.getElementById('commentary').innerText = msg;
                        if(score === 5) unlockSecret();
                        if(score > 20) gameSpeed += 0.1; // Speed up!
                    } else if (item.type === '☁️') {
                        item.type = '🌸'; // Heal vibe
                        vibesHealed++;
                    }
                }
                document.getElementById('score-stats').innerText = `Strawberries & Momos: ${score} | Vibes Healed: ${vibesHealed}`;
            });

            items = items.filter(i => i.x > -50);
            requestAnimationFrame(update);
        }

        function spawn() {
            const rand = Math.random();
            let type = rand > 0.6 ? '🍓' : (rand > 0.3 ? '🥟' : '☁️');
            items.push({ x: canvas.width, y: (type === '☁️' ? 180 : 100 + Math.random()*50), type: type });
        }

        function jump() { if(player.grounded) { player.dy = -12; player.grounded = false; } }
        window.addEventListener('touchstart', (e) => { jump(); e.preventDefault(); }, {passive: false});
        window.addEventListener('mousedown', jump);

        function unlockSecret() {
            if (unlocked) return;
            unlocked = true;
            document.getElementById('secret-area').style.display = 'block';
            typeWriter(myMessage, 0);
        }

        function typeWriter(text, i) {
            if (i < text.length) {
                document.getElementById("personal-note").innerHTML = text.substring(0, i + 1).replace(/\n/g, '<br>');
                setTimeout(() => typeWriter(text, i + 1), 60);
            } else { document.getElementById('reveal-btn').style.display = 'block'; }
        }

        function showFinal() {
            document.getElementById('video-wrap').style.display = 'block';
            document.getElementById('bdayVid').play();
            document.getElementById('video-wrap').scrollIntoView({behavior:'smooth'});
        }

        setInterval(spawn, 1500);
        update();
    </script>
</body>
</html>
