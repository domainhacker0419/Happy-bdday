<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #fdfaf6; /* Soothing Cream/Off-white */
            font-family: 'Segoe UI', sans-serif;
            color: #5a5a5a;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: manipulation;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 300px;
            background: #fff;
            border-bottom: 2px solid #eee;
        }

        .header {
            padding: 20px;
            text-align: center;
        }

        h1 {
            margin: 0;
            color: #ff9a9e;
            font-size: 2rem;
        }

        #status-msg {
            height: 20px;
            font-weight: bold;
            color: #f093fb;
            margin-top: 10px;
        }

        /* Floating Balloons */
        .balloon {
            position: absolute;
            bottom: -100px;
            font-size: 30px;
            animation: floatUp 8s linear infinite;
            z-index: -1;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-110vh) rotate(20deg); }
        }

        #video-section {
            display: none;
            margin-top: 20px;
            width: 90%;
            max-width: 320px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        video { width: 100%; }

        .btn {
            background: #ff9a9e;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1rem;
            margin: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body onclick="jump()">

    <div class="header">
        <h1>Happy Birthday! 🎂</h1>
        <p>Catch the cake! Tap to jump.</p>
        <div id="status-msg"></div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <button class="btn" onclick="revealVideo()">See Your Surprise 🎁</button>

    <div id="video-section">
        <video id="bdayVideo" playsinline controls>
            <source src="your-video.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusMsg = document.getElementById('status-msg');

        canvas.width = window.innerWidth;
        canvas.height = 300;

        let player = { x: 50, y: 200, w: 40, h: 40, dy: 0, jumpPower: -12, gravity: 0.6, grounded: false };
        let items = [];
        let score = 0;

        function spawnItem() {
            const isGood = Math.random() > 0.3;
            items.push({
                x: canvas.width,
                y: isGood ? 150 + Math.random() * 50 : 210,
                w: 30, h: 30,
                type: isGood ? '🎂' : '🚫',
                text: isGood ? 'Cake' : 'Bad Vibe',
                speed: 4
            });
        }

        function jump() {
            if (player.grounded) {
                player.dy = player.jumpPower;
                player.grounded = false;
            }
        }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Player Physics
            player.dy += player.gravity;
            player.y += player.dy;
            if (player.y > 200) { player.y = 200; player.grounded = true; }

            // Draw Player (Small Sparkle/Emoji)
            ctx.font = "40px Arial";
            ctx.fillText("✨", player.x, player.y);

            items.forEach((item, index) => {
                item.x -= item.speed;
                ctx.font = "25px Arial";
                ctx.fillText(item.type, item.x, item.y);

                // Collision detection
                if (player.x < item.x + 20 && player.x + 20 > item.x && player.y < item.y && player.y + 20 > item.y - 20) {
                    if (item.type === '🚫') {
                        item.type = '💖'; // Transform!
                        statusMsg.innerText = "No bad vibes in your life, cutie! ✨";
                        setTimeout(() => statusMsg.innerText = "", 2000);
                    } else if (item.type === '🎂') {
                        item.type = '✨';
                        score++;
                    }
                }
            });

            items = items.filter(i => i.x > -50);
            requestAnimationFrame(update);
        }

        function createBalloon() {
            const b = document.createElement('div');
            b.className = 'balloon';
            const colors = ['🎈', '🌸', '✨', '☁️'];
            b.innerText = colors[Math.floor(Math.random()*colors.length)];
            b.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(b);
            setTimeout(() => b.remove(), 8000);
        }

        function revealVideo() {
            document.getElementById('video-section').style.display = 'block';
            document.getElementById('bdayVideo').play();
            window.scrollTo(0, document.body.scrollHeight);
        }

        setInterval(spawnItem, 2000);
        setInterval(createBalloon, 1000);
        update();
    </script>
</body>
</html>
