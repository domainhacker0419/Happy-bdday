<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday!</title>
    <style>
        :root {
            --soft-pink: #ffb7b2;
            --soft-cream: #fff9f0; /* Soothing off-white */
            --text-color: #6d6875;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--soft-cream);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
            text-align: center;
            overflow-x: hidden;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        h1 { font-size: 2.5rem; color: #ff8b94; margin-bottom: 10px; }
        .scroll-down { margin-top: 20px; font-size: 0.9rem; opacity: 0.6; animation: bounce 2s infinite; }

        /* Game Section */
        .game-section {
            padding: 50px 0;
            background: white;
            border-top: 2px solid #fdf2f2;
        }

        #gameCanvas {
            background: #fff;
            display: block;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 183, 178, 0.2);
            touch-action: none;
        }

        #score-board { font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; color: var(--soft-pink); }
        #status-msg { height: 25px; margin: 10px 0; font-weight: 600; color: #ff8b94; }

        /* Secret Message Area */
        #secret-area {
            display: none;
            padding: 40px 20px;
            animation: fadeIn 1.5s;
        }

        .message-box {
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            margin: 0 auto;
            line-height: 1.8;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            text-align: left;
            border: 1px solid var(--soft-pink);
        }

        .btn {
            background: var(--soft-pink);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
        }

        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Happy Birthday! 🎂</h1>
        <p>A little surprise just for you...</p>
        <div class="scroll-down">Scroll down to play ↡</div>
    </div>

    <div class="game-section">
        <div id="score-board">Treats Collected: 0 / 5</div>
        <div id="status-msg">Tap to jump!</div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="secret-area">
        <div class="message-box">
            <p id="personal-note"></p>
        </div>
        
        <button class="btn" id="reveal-btn" style="display:none;" onclick="showFinalSurprise()">See Your Video 🎁</button>
        
        <div id="video-container" style="display:none; margin-top: 30px;">
            <video id="bdayVideo" controls playsinline style="width: 100%; max-width: 320px; border-radius: 15px;">
                <source src="your-video.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <script>
        // --- YOUR DATA ---
        const myMessage = "Hello Isha...\n\nYou're the most beautiful person I know.\nI hope today is filled with your favorite things.";
        const winScore = 5;

        // --- GAME LOGIC ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = Math.min(window.innerWidth - 40, 360);
        canvas.height = 300;

        let player = { x: 50, y: 230, dy: 0, grounded: false };
        let items = [];
        let score = 0;
        let unlocked = false;

        function handleInput(e) {
            if (player.grounded) { player.dy = -11; player.grounded = false; }
            if (e.type === 'touchstart') e.preventDefault();
        }
        canvas.addEventListener('touchstart', handleInput);
        canvas.addEventListener('mousedown', handleInput);

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Player (Sparkle/Star)
            player.dy += 0.6;
            player.y += player.dy;
            if (player.y > 230) { player.y = 230; player.grounded = true; }
            ctx.font = "40px Arial";
            ctx.fillText("✨", player.x, player.y);

            items.forEach((item, index) => {
                item.x -= 3.5;
                ctx.font = "30px Arial";
                ctx.fillText(item.type, item.x, item.y);

                // Collision Detection (Bug-free vanish)
                let dist = Math.sqrt((player.x - item.x)**2 + (player.y - item.y)**2);
                if (dist < 35) {
                    if (item.type === '🍓' || item.type === '🥟') {
                        score++;
                        items.splice(index, 1); // REMOVE from screen immediately
                        document.getElementById('score-board').innerText = `Treats Collected: ${score} / ${winScore}`;
                        if (score >= winScore) unlockEverything();
                    } else if (item.type === '☁️') {
                        item.type = '🌸'; // Transform cloud to flower
                        document.getElementById('status-msg').innerText = "No bad vibes today! ✨";
                        setTimeout(() => document.getElementById('status-msg').innerText = "", 1500);
                    }
                }
            });

            items = items.filter(i => i.x > -50);
            if (!unlocked || score < winScore + 10) requestAnimationFrame(update);
        }

        function spawnItem() {
            if (unlocked && score >= winScore + 2) return;
            const rand = Math.random();
            let type = rand > 0.6 ? '🍓' : (rand > 0.2 ? '🥟' : '☁️');
            items.push({ x: canvas.width, y: (type === '☁️' ? 230 : 160), type: type });
        }

        function unlockEverything() {
            if (unlocked) return;
            unlocked = true;
            document.getElementById('secret-area').style.display = 'block';
            document.getElementById('status-msg').innerText = "UNLOCKED! 🎉";
            document.getElementById('secret-area').scrollIntoView({ behavior: 'smooth' });
            typeWriter(myMessage, 0);
        }

        function typeWriter(text, i) {
            if (i < text.length) {
                document.getElementById("personal-note").innerHTML = text.substring(0, i + 1).replace(/\n/g, '<br>');
                setTimeout(() => typeWriter(text, i + 1), 60);
            } else {
                document.getElementById('reveal-btn').style.display = 'inline-block';
            }
        }

        function showFinalSurprise() {
            document.getElementById('video-container').style.display = 'block';
            document.getElementById('bdayVideo').play();
        }

        setInterval(spawnItem, 1800);
        update();
    </script>
</body>
</html>
